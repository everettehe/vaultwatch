# vaultwatch example configuration
# Copy this file to vaultwatch.yaml and adjust to your environment.

vault:
  # Vault server address. Can also be set via VAULT_ADDR environment variable.
  address: "https://vault.example.com:8200"

  # Vault token for authentication. Prefer VAULT_TOKEN env var in production.
  token: "s.CHANGEME"

  # Optional: Vault namespace (Vault Enterprise only).
  # namespace: "admin"

alerts:
  # Send a warning alert this long before a secret expires.
  warn_before: 168h   # 7 days

  # Send a critical alert this long before a secret expires.
  crit_before: 24h    # 1 day

  # Optional: Slack incoming webhook URL for notifications.
  # slack_webhook: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  # Optional: Email address to send alert notifications to.
  # email: "ops@example.com"

# List of Vault secret paths to monitor for expiration.
secrets:
  - path: secret/data/myapp/database
    description: "MyApp production database credentials"

  - path: secret/data/myapp/api-key
    description: "Third-party API key — rotates every 90 days"

  - path: secret/data/shared/tls-cert
    description: "Wildcard TLS certificate"
