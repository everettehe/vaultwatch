vault:
  address: "https://vault.example.com"
  token: "s.xxxxxxxxxxxxxxxx"
  namespace: ""  # optional, for Vault Enterprise
  timeout: "30s"

monitor:
  paths:
    - "secret/data/db"
    - "secret/data/api"
    - "secret/data/certs"
  warn_before: "72h"   # alert this far before expiration
  check_interval: "1h" # how often to scan

notifiers:
  log:
    enabled: true

  email:
    enabled: false
    host: "smtp.example.com"
    port: 587
    username: "alerts@example.com"
    password: "smtp-password"
    from: "alerts@example.com"
    to:
      - "ops@example.com"

  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  teams:
    enabled: false
    webhook_url: "https://outlook.office.com/webhook/XXX"

  pagerduty:
    enabled: false
    integration_key: "your-pagerduty-integration-key"

  opsgenie:
    enabled: false
    api_key: "your-opsgenie-api-key"
    api_url: ""  # optional, defaults to https://api.opsgenie.com/v2/alerts

  webhook:
    enabled: false
    url: "https://your-endpoint.example.com/hooks/vault"
    method: "POST"  # optional, defaults to POST
    headers:
      Authorization: "Bearer your-token"
