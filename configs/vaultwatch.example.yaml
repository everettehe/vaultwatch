# vaultwatch example configuration
# Copy this file to vaultwatch.yaml and adjust values as needed.

vault:
  address: "https://vault.example.com"
  token: "s.your-vault-token"
  namespace: ""          # optional: Vault Enterprise namespace
  timeout: "10s"         # HTTP client timeout

# Paths to scan for secrets. Supports recursive listing.
paths:
  - "secret/data/production"
  - "secret/data/staging"

# How far in advance to warn before a secret expires.
warn_before: "72h"   # e.g. 72h, 7d

# Alert check interval.
check_interval: "1h"

notifiers:
  # Log to stdout (always enabled as fallback).
  log:
    enabled: true

  # Send alerts to a Slack channel via Incoming Webhook.
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  # Send alerts via email (SMTP).
  email:
    enabled: false
    host: "smtp.example.com"
    port: 587
    username: "alerts@example.com"
    password: "smtp-password"
    from: "alerts@example.com"
    to:
      - "ops@example.com"

  # Send alerts to a generic HTTP webhook.
  webhook:
    enabled: false
    url: "https://hooks.example.com/vaultwatch"
    method: "POST"    # default: POST

  # Page on-call via PagerDuty Events API v2.
  pagerduty:
    enabled: false
    integration_key: "your-pagerduty-integration-key"
